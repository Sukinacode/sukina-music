<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukina Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="brand"><span>S</span>ukina Music</div>
    <div class="api-toggle">
        <button class="on" data-api="qq" onclick="setAPI('qq')">QQ音乐</button>
        <button data-api="netease" onclick="setAPI('netease')">网易云</button>
    </div>
    <div class="topbar-actions">
        <button class="icon-btn" onclick="openSettings()" title="设置">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="切换主题">
            <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</div>

<!-- Search -->
<div class="search-row" style="position:relative">
    <input id="searchInp" placeholder="搜索歌曲、歌手、专辑..." oninput="handleSuggest(this.value)" onkeydown="if(event.key==='Enter')doSearch()"/>
    <button class="btn btn-accent" onclick="doSearch()">搜索</button>
    <div class="suggest-drop" id="suggestDrop"></div>
</div>

<!-- Nav -->
<div class="nav-row">
    <button class="on" data-tab="search" onclick="switchTab('search')">搜索结果</button>
    <button data-tab="playlist" onclick="switchTab('playlist')">歌单</button>
    <button data-tab="chart" onclick="switchTab('chart')">排行榜</button>
    <button data-tab="hot" onclick="switchTab('hot')">热搜</button>
    <button data-tab="rec" onclick="switchTab('rec')">推荐</button>
</div>

<!-- Content -->
<div class="content" id="contentArea">
    <div class="empty">
        <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <p style="font-weight:600;margin-bottom:4px">欢迎使用 Sukina Music</p>
        <p style="font-size:13px">搜索音乐，或浏览歌单、排行榜开始听歌</p>
    </div>
</div>

<!-- Player -->
<div class="player" id="playerBar">
    <div class="info">
        <div class="pcover-ph" id="pCover"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <div>
            <div class="ptitle" id="pTitle">未在播放</div>
            <div class="partist" id="pArtist">—</div>
        </div>
    </div>
    <div class="ctrls">
        <div class="btns">
            <button class="pbtn" onclick="prev()" title="上一首"><svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4 19,20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
            <button class="pbtn play" id="playBtn" onclick="togglePlay()"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></button>
            <button class="pbtn" onclick="next()" title="下一首"><svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20 5,4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
            <button class="pbtn loop" id="loopBtn" onclick="toggleLoop()" title="循环"><svg viewBox="0 0 24 24"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></button>
        </div>
        <div class="progress-wrap">
            <span class="t" id="curTime">00:00</span>
            <div class="progress-bar" id="progBar" onclick="seek(event)"><div class="fill" id="progFill" style="width:0"></div></div>
            <span class="t" id="durTime">00:00</span>
        </div>
    </div>
    <div class="vol-wrap">
        <button class="pbtn" onclick="toggleMute()" id="volIcon"><svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg></button>
        <input type="range" class="vol-slider" min="0" max="100" value="70" oninput="setVol(this.value)">
    </div>
    <button class="lyric-toggle" id="lyricBtn" onclick="toggleLyric()" title="歌词"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="20" y2="6"/><line x1="6" y1="10" x2="16" y2="10"/><line x1="6" y1="14" x2="20" y2="14"/><line x1="6" y1="18" x2="16" y2="18"/></svg></button>
</div>

<!-- Lyrics Panel -->
<div class="lyric-panel" id="lyricPanel">
    <div class="hdr"><h3>歌词</h3><button onclick="toggleLyric()">&times;</button></div>
    <div class="body" id="lyricBody"><div class="empty"><p style="font-size:14px">暂无歌词</p></div></div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-panel" id="settingsPanel">
        <div class="s-hdr"><h2>设置</h2><button class="icon-btn" onclick="closeSettings()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="s-body">
            <div class="setting-group">
                <div class="g-title">播放</div>
                <div class="setting-row">
                    <div><div class="s-label">音质偏好</div><div class="s-desc">优先尝试的音质等级</div></div>
                    <select class="setting-select" id="setQuality" onchange="saveSettings()">
                        <option value="auto">自动（最高可用）</option>
                        <option value="320">320kbps / 极高</option>
                        <option value="128">128kbps / 标准</option>
                    </select>
                </div>
                <div class="setting-row">
                    <div><div class="s-label">播放错误时自动下一首</div><div class="s-desc">加载失败自动跳到下一首</div></div>
                    <label class="toggle-switch"><input type="checkbox" id="setAutoNext" onchange="saveSettings()"><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-group">
                <div class="g-title">外观</div>
                <div class="setting-row">
                    <div><div class="s-label">跟随系统主题</div><div class="s-desc">自动跟随系统深色/浅色模式</div></div>
                    <label class="toggle-switch"><input type="checkbox" id="setFollowSystem" onchange="saveSettings();applyTheme()"><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-group">
                <div class="g-title">缓存</div>
                <div class="setting-row">
                    <div><div class="s-label">缓存搜索结果</div><div class="s-desc">搜索过的结果缓存 30 分钟</div></div>
                    <label class="toggle-switch"><input type="checkbox" id="setCache" checked onchange="saveSettings()"><span class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <div><div class="s-label">记住音量</div><div class="s-desc">关闭页面后保留音量设置</div></div>
                    <label class="toggle-switch"><input type="checkbox" id="setRememberVol" checked onchange="saveSettings()"><span class="slider"></span></label>
                </div>
                <div class="setting-row" style="justify-content:flex-start; gap:12px;">
                    <button class="btn-secondary" onclick="clearCache()" style="flex:none;padding:8px 16px;">清除缓存</button>
                    <span style="font-size:11px;color:var(--text2)">清除所有本地缓存数据</span>
                </div>
            </div>
            <div class="setting-group">
                <div class="g-title">快捷键</div>
                <div class="kbd-row"><span class="k">播放 / 暂停</span><span class="v">空格</span></div>
                <div class="kbd-row"><span class="k">下一首</span><span class="v">N</span></div>
                <div class="kbd-row"><span class="k">快进 / 快退</span><span class="v">← →</span></div>
                <div class="kbd-row"><span class="k">音量增减</span><span class="v">↑ ↓</span></div>
                <div class="kbd-row"><span class="k">静音 / 取消静音</span><span class="v">M</span></div>
                <div class="kbd-row"><span class="k">切换歌词</span><span class="v">L</span></div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio" ontimeupdate="tick()" onloadedmetadata="tick()" onended="onEnd()" onerror="onErr()" preload="auto"></audio>

<script>
// ── Config ──
const QQ = 'https://qq.sukina.top';
// 网易云API地址:
//   - 本地开发: node proxy.js 启动代理，自动使用 localhost:8765
//   - Vercel部署: index.html 部署到Vercel后自动用 /api 相对路径
//   - 仅HTML本地打开+远程API: 设为 'https://你的项目名.vercel.app/api'
const NE = location.protocol === 'file:'
    ? 'http://localhost:8765/api'   // 本地开发
    : '/api';                        // Vercel部署
const NE2 = 'https://api.injahow.cn/meting';
const CACHE_PREFIX = 'sukina_v2_';
const CACHE_TTL = 30 * 60 * 1000;
const FETCH_TIMEOUT = 15000; // 15s timeout

// ── State ──
let api = 'qq', tab = 'search';
let playlist = [], idx = -1, loop = 0, lastVol = 70, lyLines = [];
let searchR = [], curSongs = [];
let currentAbort = null;
const au = document.getElementById('audio');
const $ = id => document.getElementById(id);

// ── NE fetch (via local proxy) ──
async function neFetch(path, opts = {}) {
    const r = await tFetch(NE + path, opts);
    return await r.json();
}

// ── Timed Fetch ──
async function tFetch(url, opts = {}) {
    if (currentAbort) currentAbort.abort();
    currentAbort = new AbortController();
    const timeout = opts.timeout || FETCH_TIMEOUT;
    let timer;
    try {
        const controller = currentAbort;
        timer = setTimeout(() => controller.abort(), timeout);
        const r = await fetch(url, { ...opts, signal: controller.signal });
        clearTimeout(timer);
        currentAbort = null;
        return r;
    } catch (e) {
        clearTimeout(timer);
        if (currentAbort && e.name === 'AbortError') {
            // If it was our timeout abort, re-throw a custom error
            throw new Error('TIMEOUT');
        }
        throw e;
    } finally {
        if (currentAbort && currentAbort.signal.aborted === false) {
            currentAbort = null;
        }
    }
}

// ── Settings Engine ──
const defaults = {
    quality: 'auto', autoNext: false, followSystem: false,
    cache: true, rememberVol: true, theme: 'dark', volume: 70
};
function loadSettings() {
    try {
        const raw = localStorage.getItem(CACHE_PREFIX + 'settings');
        return raw ? { ...defaults, ...JSON.parse(raw) } : { ...defaults };
    } catch { return { ...defaults }; }
}
function saveSettings() {
    const s = loadSettings();
    s.quality = $('setQuality').value;
    s.autoNext = $('setAutoNext').checked;
    s.followSystem = $('setFollowSystem').checked;
    s.cache = $('setCache').checked;
    s.rememberVol = $('setRememberVol').checked;
    localStorage.setItem(CACHE_PREFIX + 'settings', JSON.stringify(s));
    if (!s.cache) clearCache();
    toast('设置已保存');
}
function applySettings() {
    const s = loadSettings();
    $('setQuality').value = s.quality;
    $('setAutoNext').checked = s.autoNext;
    $('setFollowSystem').checked = s.followSystem;
    $('setCache').checked = s.cache;
    $('setRememberVol').checked = s.rememberVol;
}
function applyTheme() {
    const s = loadSettings();
    const html = document.documentElement;
    if (s.followSystem) {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.dataset.theme = isDark ? 'dark' : 'light';
    } else {
        html.dataset.theme = s.theme;
    }
    updateThemeIcons();
}
function updateThemeIcons() {
    const isDark = document.documentElement.dataset.theme === 'dark';
    document.querySelector('.icon-sun').style.display = isDark ? 'none' : '';
    document.querySelector('.icon-moon').style.display = isDark ? '' : 'none';
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (loadSettings().followSystem) applyTheme();
});

// ── Cache Helpers ──
function cacheGet(key) {
    if (!loadSettings().cache) return null;
    try {
        const raw = localStorage.getItem(CACHE_PREFIX + key);
        if (!raw) return null;
        const { data, ts } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_PREFIX + key); return null; }
        return data;
    } catch { return null; }
}
function cacheSet(key, data) {
    if (!loadSettings().cache) return;
    try {
        localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ data, ts: Date.now() }));
    } catch { pruneCache(); }
}
function clearCache() {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(CACHE_PREFIX) && k !== CACHE_PREFIX + 'settings');
    keys.forEach(k => localStorage.removeItem(k));
    toast('缓存已清除');
}
function pruneCache() {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(CACHE_PREFIX) && k !== CACHE_PREFIX + 'settings');
    keys.sort((a, b) => {
        try { return (JSON.parse(localStorage.getItem(a)).ts || 0) - (JSON.parse(localStorage.getItem(b)).ts || 0); }
        catch { return 0; }
    });
    for (let i = 0; i < Math.min(10, keys.length); i++) localStorage.removeItem(keys[i]);
}

// ── Init ──
(function init() {
    applySettings();
    applyTheme();
    const s = loadSettings();
    au.volume = s.rememberVol ? (s.volume / 100) : 0.7;
    lastVol = s.rememberVol ? s.volume : 70;
    document.querySelector('.vol-slider').value = au.volume * 100;
    updateVolIcon(au.volume * 100);
})();

// ── API Toggle ──
function setAPI(a) {
    api = a;
    document.querySelectorAll('.api-toggle button').forEach(b => b.classList.toggle('on', b.dataset.api === a));
    toast(api === 'qq' ? 'QQ音乐' : '网易云音乐');
    clearContent(); loadTab(tab);
}
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    updateThemeIcons();
    const s = loadSettings();
    s.theme = html.dataset.theme;
    s.followSystem = false;
    $('setFollowSystem').checked = false;
    localStorage.setItem(CACHE_PREFIX + 'settings', JSON.stringify(s));
}
function openSettings() { $('settingsOverlay').classList.add('open'); }
function closeSettings() { $('settingsOverlay').classList.remove('open'); }

function switchTab(t) {
    tab = t;
    document.querySelectorAll('.nav-row button').forEach(b => b.classList.toggle('on', b.dataset.tab === t));
    clearContent(); loadTab(t);
}
function clearContent() { $('contentArea').innerHTML = ''; }
function loadTab(t) {
    switch (t) {
        case 'search': if (searchR.length) renderSongs(searchR); else showEmpty('搜索你喜欢的音乐'); break;
        case 'playlist': fetchPlaylists(); break;
        case 'chart': fetchCharts(); break;
        case 'hot': fetchHot(); break;
        case 'rec': fetchRec(); break;
    }
}

// ── Suggest (debounced) ──
let suggestTimer;
function handleSuggest(q) {
    clearTimeout(suggestTimer);
    const dd = $('suggestDrop');
    if (!q || q.length < 1 || api !== 'qq') { dd.classList.remove('show'); return; }
    suggestTimer = setTimeout(async () => {
        try {
            const ck = 'suggest_' + q;
            let data = cacheGet(ck);
            if (!data) {
                const r = await tFetch(`${QQ}/getSmartbox?key=${encodeURIComponent(q)}`);
                data = await r.json();
                cacheSet(ck, data);
            }
            if (data && data.response && data.response.data) {
                const items = data.response.data;
                let h = '';
                if (items.song && items.song.itemlist) {
                    items.song.itemlist.slice(0, 8).forEach(s => {
                        h += `<div class="item" onclick="pickSuggest('${escA(s.name)}')"><span class="tag">歌曲</span>${escH(s.name)} - ${escH(s.singer)}</div>`;
                    });
                }
                dd.innerHTML = h || '';
                if (h) dd.classList.add('show'); else dd.classList.remove('show');
            } else dd.classList.remove('show');
        } catch { dd.classList.remove('show'); }
    }, 260);
}
function pickSuggest(q) { $('searchInp').value = q; $('suggestDrop').classList.remove('show'); doSearch(); }
document.addEventListener('click', e => { if (!e.target.closest('.search-row')) $('suggestDrop').classList.remove('show'); });

// ── Search (with timeout + fallback) ──
async function doSearch() {
    const q = $('searchInp').value.trim(); if (!q) return;
    $('suggestDrop').classList.remove('show');
    switchTab('search'); tab = 'search';
    document.querySelectorAll('.nav-row button').forEach(b => b.classList.toggle('on', b.dataset.tab === 'search'));
    showLoading();
    try {
        if (api === 'qq') await searchQQ(q); else await searchNE(q);
    } catch (e) {
        if (e.name !== 'AbortError') {
            console.error('搜索失败:', e);
            showEmpty('搜索失败，请稍后重试或尝试切换音源');
        }
    }
}
async function searchQQ(q) {
    const ck = 'search_qq_' + q;
    // Try cached data first
    let data = cacheGet(ck);
    if (data) {
        if (data && data.response && data.response.data && data.response.data.song) {
            searchR = mapQQSongs(data.response.data.song.list || []);
            renderSongs(searchR);
            return;
        }
    }
    // Try main search API with timeout
    try {
        const r = await tFetch(`${QQ}/getSearchByKey?key=${encodeURIComponent(q)}`);
        data = await r.json();
        cacheSet(ck, data);
        if (data && data.response && data.response.data && data.response.data.song) {
            searchR = mapQQSongs(data.response.data.song.list || []);
            renderSongs(searchR);
            return;
        }
    } catch (e) {
        console.warn('主搜索API超时/失败，尝试备用方案:', e.message);
    }
    // Fallback: use smartbox as search source
    try {
        const rb = await tFetch(`${QQ}/getSmartbox?key=${encodeURIComponent(q)}`);
        const db = await rb.json();
        if (db && db.response && db.response.data && db.response.data.song && db.response.data.song.itemlist) {
            const items = db.response.data.song.itemlist;
            searchR = items.map((s, i) => ({
                id: s.mid || s.id || ('s' + i), title: s.name || '',
                artist: s.singer || '', album: '', cover: '',
                dur: 0, src: 'qq', songmid: s.mid, albummid: ''
            }));
            if (searchR.length) {
                toast('已通过快捷建议获取结果');
                cacheSet(ck, { response: { data: { song: { list: [] } } } });
                renderSongs(searchR);
                return;
            }
        }
    } catch (e2) {
        console.warn('备用搜索也失败了:', e2);
    }
    searchR = [];
    showEmpty('搜索超时，请稍后重试');
}
function mapQQSongs(list) {
    return list.map(s => ({
        id: s.songmid || s.id, title: s.songname || s.name,
        artist: (s.singer || []).map(si => si.name).join(' / '),
        album: s.albumname || (s.album || {}).name || '',
        cover: s.albummid ? `https://y.gtimg.cn/music/photo_new/T002R150x150M000${s.albummid}.jpg` : '',
        dur: s.interval || 0, src: 'qq', songmid: s.songmid, albummid: s.albummid
    }));
}
async function searchNE(q) {
    const ck = 'search_ne_' + q;
    let data = cacheGet(ck);
    if (data) {
        if (data && data.result && data.result.songs) {
            searchR = mapNESongs(data.result.songs);
            renderSongs(searchR);
            return;
        }
    }
    try {
        data = await neFetch(`/cloudsearch/pc?s=${encodeURIComponent(q)}&type=1&limit=30`);
        cacheSet(ck, data);
        if (data && data.result && data.result.songs) {
            searchR = mapNESongs(data.result.songs);
            renderSongs(searchR);
        } else {
            searchR = [];
            showEmpty('未找到歌曲');
        }
    } catch (e) {
        console.warn('网易云搜索失败:', e.message);
        searchR = [];
        showEmpty('网易云API暂不可用，请切换到QQ音源');
    }
}
function mapNESongs(songs) {
    return (songs || []).map(s => {
        // Handle cloudsearch format (al, ar, dt) and older format (album, artists, duration)
        const al = s.al || s.album || {};
        const ar = s.ar || s.artists || [];
        return {
            id: s.id, title: s.name,
            artist: ar.map(a => a.name).join(' / '),
            album: al.name || '',
            cover: al.picUrl || '',
            dur: (s.dt || s.duration || 0) / 1000, src: 'ne', nid: s.id
        };
    });
}

// ── Lazy Image Loading ──
function lazyLoadCovers() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;
                if (src) { img.src = src; img.onload = () => img.classList.add('loaded'); img.removeAttribute('data-src'); }
                observer.unobserve(img);
            }
        });
    }, { rootMargin: '200px' });
    document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
}

// ── MediaSession API ──
function updateMediaSession(s) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
        title: s.title, artist: s.artist, album: s.album || '',
        artwork: s.cover ? [{ src: s.cover, sizes: '150x150', type: 'image/jpeg' }] : []
    });
    navigator.mediaSession.setActionHandler('play', () => { au.play(); setPlayIcon(true); });
    navigator.mediaSession.setActionHandler('pause', () => { au.pause(); setPlayIcon(false); });
    navigator.mediaSession.setActionHandler('previoustrack', prev);
    navigator.mediaSession.setActionHandler('nexttrack', next);
    navigator.mediaSession.setActionHandler('seekto', (d) => { if (d.seekTime != null) au.currentTime = d.seekTime; });
}
function updateMediaSessionState(state) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.playbackState = state;
}

function toggleLyric() { $('lyricPanel').classList.toggle('open'); $('lyricBtn').classList.toggle('on'); }
async function fetchLyric(s) {
    const body = $('lyricBody');
    body.innerHTML = '<div class="loading"><div class="spinner"></div>加载歌词</div>';
    try {
        let txt;
        if (s.src === 'qq') txt = await getQQLyric(s.songmid);
        else txt = await getNELyric(s.nid || s.id);
        if (txt) { lyLines = parseLyric(txt); renderLyric(); }
        else { body.innerHTML = '<div class="empty"><p>暂无歌词</p></div>'; lyLines = []; }
    } catch { body.innerHTML = '<div class="empty"><p>歌词加载失败</p></div>'; lyLines = []; }
}
async function getQQLyric(mid) {
    const r = await fetch(`${QQ}/getLyric?songmid=${mid}&isFormat=true`);
    const d = await r.json();
    if (d && d.response && d.response.data) return d.response.data.lyric || d.response.data;
    return null;
}
async function getNELyric(id) {
    // Try Meting first
    try {
        const r = await tFetch(`${NE2}/?server=netease&type=lrc&id=${id}`, { timeout: 8000 });
        const d = await r.json();
        if (d && d.lyric) return d.lyric;
    } catch { }
    // Try unencrypted lyric API via local proxy
    try {
        const d = await neFetch(`/song/lyric?os=pc&id=${id}&lv=-1&kv=-1&tv=-1`);
        if (d && d.lrc && d.lrc.lyric) return d.lrc.lyric;
    } catch { }
    return null;
}
function parseLyric(lrc) {
    const lines = []; const re = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/g; let m;
    while ((m = re.exec(lrc)) !== null) {
        const t = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3].length === 2 ? m[3] + '0' : m[3]) / 1000;
        const txt = m[4].trim(); if (txt) lines.push({ time: t, text: txt });
    }
    return lines.sort((a, b) => a.time - b.time);
}
function renderLyric() {
    const body = $('lyricBody');
    if (!lyLines.length) { body.innerHTML = '<div class="empty"><p>暂无歌词</p></div>'; return; }
    body.innerHTML = lyLines.map((l, i) => `<div class="lyric-line" data-i="${i}" data-t="${l.time}">${escH(l.text)}</div>`).join('');
}
let lastLyricIdx = -1;
function updateLyric() {
    if (!lyLines.length) return;
    const ct = au.currentTime; let ai = -1;
    for (let i = lyLines.length - 1; i >= 0; i--) { if (lyLines[i].time <= ct) { ai = i; break; } }
    if (ai === lastLyricIdx) return;
    lastLyricIdx = ai;
    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
    if (ai >= 0) {
        const el = document.querySelector(`.lyric-line[data-i="${ai}"]`);
        if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }
}

                const r = await tFetch(`${QQ}/getHotkey`);

                cacheSet(ck, data);
            }
            if (data && data.response && data.response.data) {
                const keys = Array.isArray(data.response.data) ? data.response.data : (data.response.data.hotkey || data.response.data.list || []);
                let h = '<div class="section-title">热门搜索</div><div class="tag-wrap">';
                keys.forEach(k => { const kw = k.k || k.word || k.name || ''; if (kw) h += `<span class="tag" onclick="quickSearch('${escA(kw)}')">${escH(kw)}</span>`; });
                h += '</div>'; $('contentArea').innerHTML = h;
            } else showEmpty('暂无数据');
        } else {
            const d = await neFetch(`/search/hot?type=1111`);
            if (d && d.result && d.result.hots) {
                let h = '<div class="section-title">热门搜索</div><div class="tag-wrap">';
                d.result.hots.slice(0, 30).forEach(k => {
                    const kw = k.first || '';
                    if (kw) h += `<span class="tag" onclick="quickSearch('${escA(kw)}')">${escH(kw)}</span>`;
                });
                h += '</div>'; $('contentArea').innerHTML = h;
            } else showEmpty('暂无数据');
        }
    } catch (e) { showEmpty('加载失败'); console.error(e); }
}
function quickSearch(kw) { $('searchInp').value = kw; doSearch(); }

// ── Recommend ──
async function fetchRec() {
    showLoading();
    try {
        if (api === 'qq') {
            const r = await tFetch(`${QQ}/getRecommend`);
            const d = await r.json();
            if (d && d.response && d.response.data) {
                const songs = d.response.data.songList || d.response.data.songlist || [];
                if (songs.length) {
                    curSongs = songs.map(s => ({
                        id: s.songmid || s.id, title: s.songname || s.name || s.title || '',
                        artist: (s.singer || []).map(si => si.name || si).join(' / '),
                        album: s.albumname || (s.album || {}).name || '',
                        cover: s.albummid ? `https://y.gtimg.cn/music/photo_new/T002R150x150M000${s.albummid}.jpg` : '',
                        dur: s.interval || 0, src: 'qq', songmid: s.songmid, albummid: s.albummid
                    }));
                    renderPlDetail('每日推荐', '', curSongs);
                } else showEmpty('暂无推荐');
            } else showEmpty('暂无推荐');
        } else {
            const d = await neFetch(`/personalized/newsong?limit=20`);
            if (d && d.result && d.result.length) {
                curSongs = mapNESongs(d.result.map(item => item.song));
                renderPlDetail('新歌推荐', '', curSongs);
            } else showEmpty('暂无推荐');
        }
    } catch (e) { showEmpty('加载失败'); console.error(e); }
}

// ── Utils ──
function fmt(s) { if (!s || isNaN(s)) return '00:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'); }
function fmtN(n) { if (!n) return '0'; if (n >= 1e8) return (n / 1e8).toFixed(1) + '亿'; if (n >= 1e4) return (n / 1e4).toFixed(1) + '万'; return String(n); }
function escH(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escA(s) { if (!s) return ''; return s.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function showLoading() { $('contentArea').innerHTML = '<div class="loading"><div class="spinner"></div>加载中</div>'; }
function showEmpty(m) { $('contentArea').innerHTML = `<div class="empty"><div class="icon-box"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><p>${m || '暂无内容'}</p></div>`; }
function toast(m) { const t = $('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200); }

// ── Keyboard ──
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
        case ' ': e.preventDefault(); togglePlay(); break;
        case 'ArrowRight': au.currentTime = Math.min(au.duration || 0, au.currentTime + 5); break;
        case 'ArrowLeft': au.currentTime = Math.max(0, au.currentTime - 5); break;
        case 'ArrowUp': setVol(Math.min(100, (au.volume * 100) + 5)); break;
        case 'ArrowDown': setVol(Math.max(0, (au.volume * 100) - 5)); break;
        case 'n': next(); break;
        case 'm': toggleMute(); break;
        case 'l': toggleLyric(); break;
    }
});
</script>
